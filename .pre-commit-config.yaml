repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: \.(py)$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: \.(py)$
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100"]
        files: \.(py)$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|json|md|css|yml|yaml)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.57.0
    hooks:
      - id: eslint
        files: \.(ts|tsx)$
        additional_dependencies:
          - eslint@8.57.0
          - eslint-config-next@14.2.5

  # recombyne-spelling-allow: this hook references the misspelling intentionally.
  - repo: local
    hooks:
      - id: recombyne-spelling-guard
        name: Recombyne spelling guard
        description: Block commits containing the misspelling. The correct spelling is 'Recombyne'.
        entry: scripts/recombyne_spelling_check.py
        language: script
        pass_filenames: true
        types: [text]

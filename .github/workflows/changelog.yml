name: Changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate CHANGELOG entry
        run: |
          python scripts/update_changelog.py

      - name: Commit CHANGELOG
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog updates needed"
            exit 0
          fi
          git config user.name "recombyne-bot"
          git config user.email "recombyne-bot@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push origin main

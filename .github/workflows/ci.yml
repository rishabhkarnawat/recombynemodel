name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: pip install black isort pytest
      - run: pytest -q
        working-directory: backend
      - run: black --check backend/app backend/tests scripts
      - run: isort --check-only backend/app backend/tests scripts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

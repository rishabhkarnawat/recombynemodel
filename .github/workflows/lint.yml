name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm install
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: python -m pip install --upgrade pip
      - run: pip install black isort
      - run: black --check backend/app backend/tests scripts
      - run: isort --check-only backend/app backend/tests scripts
